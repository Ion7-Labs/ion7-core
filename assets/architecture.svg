<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 460" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="14">
  <style>
    .box      { fill: none; stroke: #6b7280; stroke-width: 1.5; rx: 8; ry: 8; }
    .box-app  { fill: #eef2ff; stroke: #4f46e5; }
    .box-core { fill: #f0fdf4; stroke: #16a34a; }
    .box-side { fill: #fef3c7; stroke: #d97706; }
    .box-base { fill: #fee2e2; stroke: #dc2626; }
    .label    { fill: #1f2937; font-weight: 600; }
    .sub      { fill: #4b5563; font-size: 12px; }
    .arrow    { stroke: #6b7280; stroke-width: 1.5; fill: none; marker-end: url(#tip); }
    .arrow-down { stroke: #9ca3af; stroke-width: 1.2; stroke-dasharray: 4 3; fill: none; marker-end: url(#tip); }
    @media (prefers-color-scheme: dark) {
      .box      { stroke: #9ca3af; }
      .box-app  { fill: #1e1b4b; stroke: #818cf8; }
      .box-core { fill: #14532d; stroke: #4ade80; }
      .box-side { fill: #422006; stroke: #fbbf24; }
      .box-base { fill: #450a0a; stroke: #f87171; }
      .label    { fill: #e5e7eb; }
      .sub      { fill: #9ca3af; }
      .arrow,
      .arrow-down { stroke: #9ca3af; }
    }
  </style>

  <defs>
    <marker id="tip" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#6b7280"/>
    </marker>
  </defs>

  <!-- Tier 1: User application -->
  <rect class="box box-app" x="160" y="20" width="400" height="60"/>
  <text class="label" x="360" y="50" text-anchor="middle">Your Lua application</text>
  <text class="sub"   x="360" y="68" text-anchor="middle">chat agent · RAG pipeline · CLI tool · custom workload</text>

  <!-- Tier 2: ion7.core -->
  <rect class="box box-core" x="80" y="120" width="560" height="90"/>
  <text class="label" x="360" y="148" text-anchor="middle">ion7.core   ·   Lua + LuaJIT FFI</text>
  <text class="sub"   x="360" y="170" text-anchor="middle">Model · Context · Vocab · Sampler · Speculative</text>
  <text class="sub"   x="360" y="188" text-anchor="middle">CustomSampler · Threadpool · utf8 / base64 / log / tensor utilities</text>

  <!-- Tier 3: two paths to llama.cpp -->
  <rect class="box box-side" x="80" y="250" width="240" height="80"/>
  <text class="label" x="200" y="277" text-anchor="middle">Direct FFI</text>
  <text class="sub"   x="200" y="297" text-anchor="middle">auto-generated cdef</text>
  <text class="sub"   x="200" y="313" text-anchor="middle">llama.h + ggml*.h (stable C ABI)</text>

  <rect class="box box-side" x="400" y="250" width="240" height="80"/>
  <text class="label" x="520" y="277" text-anchor="middle">ion7_bridge.so</text>
  <text class="sub"   x="520" y="297" text-anchor="middle">~34-symbol C++ shim</text>
  <text class="sub"   x="520" y="313" text-anchor="middle">libcommon adapters only</text>

  <!-- Tier 4: llama.cpp libs -->
  <rect class="box box-base" x="80" y="370" width="560" height="70"/>
  <text class="label" x="360" y="398" text-anchor="middle">llama.cpp shared libraries</text>
  <text class="sub"   x="360" y="420" text-anchor="middle">libllama  ·  libggml  ·  libllama-common</text>

  <!-- Arrows -->
  <path class="arrow" d="M 360 80 L 360 118"/>
  <path class="arrow" d="M 220 210 L 200 248"/>
  <path class="arrow" d="M 500 210 L 520 248"/>
  <path class="arrow-down" d="M 200 330 L 200 368"/>
  <path class="arrow-down" d="M 520 330 L 520 368"/>
</svg>
