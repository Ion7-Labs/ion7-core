name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:    # manual trigger for dry-run testing

jobs:
  # ── Build matrix ─────────────────────────────────────────────────────────
  build:
    name: ${{ matrix.target }}
    strategy:
      fail-fast: false
      matrix:
        # Every entry passes `-DGGML_CUDA=OFF` explicitly because the
        # vendored llama.cpp's CMakeLists has `GGML_CUDA=ON` as its
        # default ; cmake would otherwise look for `nvcc` on every
        # runner and fail the configure step on the cards-without-CUDA
        # platforms (ARM, macOS, Linux CPU runner).
        include:
          # Linux x86_64
          - target:    linux-x86_64-cpu
            os:        ubuntu-latest
            backend:   cpu
            cmake_flags: "-DGGML_CUDA=OFF"
            apt_extra:  ""
          - target:    linux-x86_64-vulkan
            os:        ubuntu-latest
            backend:   vulkan
            cmake_flags: "-DGGML_CUDA=OFF -DGGML_VULKAN=ON"
            apt_extra:   "libvulkan-dev glslang-tools spirv-headers"

          # Linux aarch64
          - target:    linux-aarch64-cpu
            os:        ubuntu-24.04-arm
            backend:   cpu
            cmake_flags: "-DGGML_CUDA=OFF"
            apt_extra:  ""

          # macOS
          - target:    macos-arm64-metal
            os:        macos-14
            backend:   metal
            cmake_flags: "-DGGML_CUDA=OFF -DGGML_METAL=ON"
            apt_extra:  ""
          - target:    macos-x86_64-cpu
            os:        macos-13
            backend:   cpu
            cmake_flags: "-DGGML_CUDA=OFF"
            apt_extra:  ""

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Read llama.cpp pinned SHA
        id: llama_sha
        shell: bash
        run: |
          SHA="$(git -C vendor/llama.cpp rev-parse HEAD)"
          echo "sha=$SHA" >> "$GITHUB_OUTPUT"

      - name: Cache vendored llama.cpp build
        id: cache-llama
        uses: actions/cache@v4
        with:
          path: vendor/llama.cpp/build
          key: llama-${{ matrix.target }}-${{ steps.llama_sha.outputs.sha }}

      - name: Install build deps (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y cmake build-essential ${{ matrix.apt_extra }}

      - name: Install build deps (macOS)
        if: runner.os == 'macOS'
        run: brew install cmake

      - name: Build vendored llama.cpp
        if: steps.cache-llama.outputs.cache-hit != 'true'
        run: make llama LLAMA_CMAKE_EXTRA="${{ matrix.cmake_flags }}"

      - name: Build ion7 bridge (release rpath)
        env:
          ION7_RELEASE: "1"
        run: make build

      # ── Package ────────────────────────────────────────────────────────
      - name: Package release tarball
        id: pkg
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME:-dev}"
          NAME="ion7-core-${VERSION}-${{ matrix.target }}"
          STAGE="$NAME"

          mkdir -p "$STAGE/lib" "$STAGE/bin"

          # Native libraries — bridge + every llama.cpp shared lib it
          # transitively pulls in. We follow the dylib / so glob and
          # rely on the rpath baked above ($ORIGIN / @loader_path) to
          # resolve siblings at load time.
          if [ "${{ runner.os }}" = "macOS" ]; then
            cp bridge/ion7_bridge.so                       "$STAGE/lib/" || true
            cp bridge/ion7_bridge.dylib                    "$STAGE/lib/" || true
            cp vendor/llama.cpp/build/bin/lib*.dylib*      "$STAGE/lib/" || true
          else
            cp bridge/ion7_bridge.so                       "$STAGE/lib/"
            cp -d vendor/llama.cpp/build/bin/lib*.so*      "$STAGE/lib/" || true
          fi

          # Strip debug info to shrink the tarball. macOS uses different
          # flags ; the `|| true` keeps the step idempotent if there is
          # nothing to strip (already stripped, missing tool, ...).
          if [ "${{ runner.os }}" = "Linux" ]; then
            strip --strip-unneeded "$STAGE/lib/"*.so* 2>/dev/null || true
          else
            strip -x "$STAGE/lib/"*.dylib* 2>/dev/null || true
          fi

          # Lua runtime + helper loader
          cp -r src/ion7    "$STAGE/src/" 2>/dev/null
          mkdir -p "$STAGE/src" && cp -r src/ion7 "$STAGE/src/"
          cp bin/ion7-load.lua  "$STAGE/bin/"

          # Top-level docs
          cp LICENSE README.md INSTALL.md "$STAGE/"

          tar czf "$NAME.tar.gz" "$STAGE"

          # SHA256 — `sha256sum` on Linux, `shasum -a 256` on macOS.
          if command -v sha256sum >/dev/null 2>&1; then
            sha256sum "$NAME.tar.gz" > "$NAME.tar.gz.sha256"
          else
            shasum -a 256 "$NAME.tar.gz" > "$NAME.tar.gz.sha256"
          fi

          echo "name=$NAME" >> "$GITHUB_OUTPUT"

      - name: Upload artifact
        # `actions/upload-artifact` reaches GitHub's runtime token to
        # talk to the artifact storage service ; that token does not
        # exist when the workflow runs through `act` locally. Skipping
        # this step there lets a local dry-run finish green while the
        # real CI keeps publishing the bundle as usual.
        if: ${{ !env.ACT }}
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.pkg.outputs.name }}
          path: |
            ion7-core-*.tar.gz
            ion7-core-*.tar.gz.sha256

  # ── Publish a GitHub Release once every build is green ──────────────────
  publish:
    name: Publish GitHub release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0    # need full history for changelog

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: ion7-core-*
          merge-multiple: true
          path: dist/

      - name: Compose release notes
        id: notes
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME}"
          PREV="$(git tag --sort=-v:refname | sed -n '2p')"
          if [ -n "$PREV" ]; then
            RANGE="$PREV..HEAD"
          else
            RANGE=""
          fi
          {
            echo "## ion7-core $VERSION"
            echo
            echo "### Pre-built tarballs"
            echo
            echo "Each tarball ships the ion7 bridge, the matching llama.cpp"
            echo "shared libraries, the Lua runtime and a \`bin/ion7-load.lua\`"
            echo "preamble that wires \`package.path\` and the loader env vars."
            echo "Extract anywhere and \`dofile(\"<path>/bin/ion7-load.lua\")\`."
            echo
            echo "Backends covered :"
            echo "- Linux x86_64 (CPU AVX2, Vulkan)"
            echo "- Linux aarch64 (CPU NEON)"
            echo "- macOS arm64 (Metal — auto-on)"
            echo "- macOS x86_64 (CPU)"
            echo
            echo "CUDA and ROCm tarballs are not shipped — driver / toolkit"
            echo "version coupling makes a redistributable binary unsafe."
            echo "Build locally :"
            echo
            echo '```bash'
            echo "make llama LLAMA_CMAKE_EXTRA='-DGGML_CUDA=ON'"
            echo "make build ION7_RELEASE=1"
            echo '```'
            echo
            if [ -n "$RANGE" ]; then
              echo "### Commits since $PREV"
              echo
              git log --oneline --no-merges "$RANGE" | sed 's/^/- /'
            fi
          } > /tmp/release_notes.md

      - name: List assets
        run: ls -lh dist/

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          # Same PAT the docs workflow consumes — lets the release
          # publish use the project-wide org token rather than the
          # repo-scoped GITHUB_TOKEN, so attribution and downstream
          # repository_dispatch hooks share a single identity.
          token:     ${{ secrets.PAGES_TOKEN }}
          name:      "ion7-core ${{ github.ref_name }}"
          body_path: /tmp/release_notes.md
          files: |
            dist/ion7-core-*.tar.gz
            dist/ion7-core-*.tar.gz.sha256
          prerelease: ${{ contains(github.ref_name, '-rc') ||
                          contains(github.ref_name, '-beta') ||
                          contains(github.ref_name, '-alpha') }}

      # Notify ion7-doc that ion7-core just published a release. The
      # docs workflow listens for `repository_dispatch: types: [docs]`
      # and re-renders the API reference + portal against the new
      # release tag.
      - name: Trigger docs rebuild
        run: |
          curl -fsSL -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.PAGES_TOKEN }}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/ion7-labs/ion7-doc/dispatches \
            -d '{
              "event_type": "docs",
              "client_payload": {
                "source": "ion7-core",
                "ref":    "${{ github.ref_name }}"
              }
            }'
