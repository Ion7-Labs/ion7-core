name: CI

on:
  push:
    branches: [main, dev, "dev-*", "feat/*"]
  pull_request:
    branches: [main, dev]

# Cancel in-progress runs on new push to same branch
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── 0a. Bridge syntax-check (fast, no llama.cpp build needed) ─────────────
  # Catches libcommon API drift in seconds rather than waiting for the
  # full build matrix. Uses the headers from the pinned submodule so the
  # check tracks the exact upstream the bridge will actually link
  # against — not floating master.
  syntax-check-bridge:
    name: Syntax-check bridge .cpp
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install clang
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y clang

      - name: Syntax-check every bridge .cpp
        run: |
          cd bridge
          INC="-isystem ../vendor/llama.cpp/include \
               -isystem ../vendor/llama.cpp/ggml/include \
               -isystem ../vendor/llama.cpp/common \
               -isystem ../vendor/llama.cpp/vendor"
          fail=0
          for f in bridge_*.cpp; do
            echo "::group::$f"
            clang++ -fsyntax-only -std=c++17 -Wall -Wextra $INC "$f" || fail=1
            echo "::endgroup::"
          done
          if [ $fail -eq 0 ]; then
            echo "✓ All bridge files passed syntax check"
          else
            echo "✗ Bridge syntax check FAILED — see grouped logs above"
            exit 1
          fi

  # ── 0b. No-model Lua suites (no native libs needed) ───────────────────────
  # `tests/00_modules.lua` stubs out ffi.load so every module under
  # src/ion7/core/ loads cleanly without a built bridge / libllama.
  # `tests/02_utilities.lua` exercises the pure-Lua helpers
  # (util.utf8 / util.base64) — same constraint.
  test-no-model:
    name: Lua tests (no model, no native libs)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install LuaJIT
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y luajit

      - name: Run module-load smoke test
        run: luajit tests/00_modules.lua

      - name: Run pure-Lua utility tests
        run: luajit tests/02_utilities.lua

  # ── 1. Build bridge — Linux x86_64 ────────────────────────────────────────
  build-linux-x64:
    name: Build bridge (Linux x86_64)
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y cmake build-essential luajit

      - name: Read llama.cpp pinned SHA
        id: sha
        run: echo "sha=$(git -C vendor/llama.cpp rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Cache vendored llama.cpp build
        id: cache-llama
        uses: actions/cache@v4
        with:
          path: vendor/llama.cpp/build
          key: llama-linux-x64-${{ steps.sha.outputs.sha }}

      - name: Build vendored llama.cpp (CPU-only)
        if: steps.cache-llama.outputs.cache-hit != 'true'
        run: make llama LLAMA_CMAKE_EXTRA="-DGGML_CUDA=OFF -DCMAKE_CXX_FLAGS=-O1"

      - name: Build ion7 bridge
        run: make build

      - name: Inspect bridge symbols
        run: |
          echo "=== Bridge binary ==="
          ls -lh bridge/ion7_bridge.so
          echo "=== Exported ion7 symbols ==="
          nm -D bridge/ion7_bridge.so | grep " T ion7_" | wc -l \
            | xargs -I{} echo "{} exported ion7_* symbols"
          nm -D bridge/ion7_bridge.so | grep " T ion7_" | head -10

      - name: Lua-side smoke test (capabilities only)
        env:
          ION7_LIBLLAMA_PATH: ${{ github.workspace }}/vendor/llama.cpp/build/bin/libllama.so
          ION7_LIBGGML_PATH:  ${{ github.workspace }}/vendor/llama.cpp/build/bin/libggml.so
          ION7_BRIDGE_PATH:   ${{ github.workspace }}/bridge/ion7_bridge.so
          LD_LIBRARY_PATH:    ${{ github.workspace }}/vendor/llama.cpp/build/bin
        run: |
          luajit tests/01_capabilities.lua

      - name: Upload bridge artifact
        uses: actions/upload-artifact@v4
        with:
          name: ion7_bridge-linux-x64
          path: bridge/ion7_bridge.so

  # ── 2. Build bridge — macOS ARM64 ─────────────────────────────────────────
  build-macos-arm64:
    name: Build bridge (macOS ARM64)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install dependencies
        run: brew install cmake luajit

      - name: Read llama.cpp pinned SHA
        id: sha
        run: echo "sha=$(git -C vendor/llama.cpp rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Cache vendored llama.cpp build
        id: cache-llama
        uses: actions/cache@v4
        with:
          path: vendor/llama.cpp/build
          key: llama-macos-arm64-${{ steps.sha.outputs.sha }}

      - name: Build vendored llama.cpp (CPU + Metal)
        if: steps.cache-llama.outputs.cache-hit != 'true'
        run: make llama LLAMA_CMAKE_EXTRA="-DGGML_CUDA=OFF -DGGML_METAL=ON"

      - name: Build ion7 bridge
        run: make build

      - name: Lua-side smoke test (capabilities only)
        env:
          ION7_LIBLLAMA_PATH: ${{ github.workspace }}/vendor/llama.cpp/build/bin/libllama.dylib
          ION7_LIBGGML_PATH:  ${{ github.workspace }}/vendor/llama.cpp/build/bin/libggml.dylib
          ION7_BRIDGE_PATH:   ${{ github.workspace }}/bridge/ion7_bridge.so
          DYLD_LIBRARY_PATH:  ${{ github.workspace }}/vendor/llama.cpp/build/bin
        run: |
          luajit tests/01_capabilities.lua

      - name: Upload bridge artifact
        uses: actions/upload-artifact@v4
        with:
          name: ion7_bridge-macos-arm64
          path: bridge/ion7_bridge.so

  # ── 3. Build bridge — Linux ARM64 ─────────────────────────────────────────
  build-linux-arm64:
    name: Build bridge (Linux ARM64)
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y cmake build-essential luajit

      - name: Read llama.cpp pinned SHA
        id: sha
        run: echo "sha=$(git -C vendor/llama.cpp rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Cache vendored llama.cpp build
        id: cache-llama
        uses: actions/cache@v4
        with:
          path: vendor/llama.cpp/build
          key: llama-linux-arm64-${{ steps.sha.outputs.sha }}

      - name: Build vendored llama.cpp (CPU-only)
        if: steps.cache-llama.outputs.cache-hit != 'true'
        run: make llama LLAMA_CMAKE_EXTRA="-DGGML_CUDA=OFF -DCMAKE_CXX_FLAGS=-O1"

      - name: Build ion7 bridge
        run: make build

      - name: Upload bridge artifact
        uses: actions/upload-artifact@v4
        with:
          name: ion7_bridge-linux-arm64
          path: bridge/ion7_bridge.so
