name: Notify ion7-doc

on:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "README.md"
      - ".github/workflows/docs.yml"
  workflow_dispatch:

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger ion7-doc deploy
        run: |
          curl -s -X POST \
            -H "Authorization: Bearer ${{ secrets.PAGES_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/ion7-labs/ion7-doc/dispatches \
            -d '{"event_type":"docs","client_payload":{"source":"ion7-core"}}'
